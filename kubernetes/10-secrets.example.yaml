# Copy this file to 10-secrets.yaml and fill real values.
# 10-secrets.yaml is .gitignored — do NOT commit it.
#
# Generate JWT secret: openssl rand -base64 48
# Generate strong passwords: openssl rand -base64 32

apiVersion: v1
kind: Secret
metadata:
  name: sparklabx-secrets
  namespace: sparklabx
type: Opaque
stringData:
  JWT_SECRET_KEY: "REPLACE_ME_AT_LEAST_48_CHARS"
  SEED_ADMIN_PASSWORD: "REPLACE_ME"
  POSTGRES_PASSWORD: "REPLACE_ME"
  MINIO_ROOT_USER: "rustfs"
  MINIO_ROOT_PASSWORD: "REPLACE_ME"
  GOOGLE_CLIENT_SECRET: ""
  MICROSOFT_CLIENT_SECRET: ""
#
# ghcr.io/sparklabx/* images are public — no image-pull secret is needed.
#
# For PRIVATE forks (your own ghcr namespace), create a pull secret with:
#
#   kubectl -n sparklabx create secret docker-registry ghcr-secret \
#     --docker-server=ghcr.io \
#     --docker-username=<your-github-user> \
#     --docker-password=<github-pat-read:packages>
#
# Then uncomment the `imagePullSecrets` block in 30-backend.yaml / 31-frontend.yaml.
