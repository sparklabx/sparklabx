# Hourly Postgres dump → MinIO bucket "sparklabx-backups" with 7-day retention.
# Requires "sparklabx-backups" bucket to exist on MinIO before first run.

apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: sparklabx
spec:
  schedule: "0 * * * *"  # hourly on the hour
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  apk add --no-cache aws-cli curl
                  TS=$(date +%Y%m%d-%H%M%S)
                  pg_dump -h postgres -U $POSTGRES_USER -d $POSTGRES_DB | gzip > /tmp/dump-$TS.sql.gz
                  aws --endpoint-url $MINIO_ENDPOINT \
                      s3 cp /tmp/dump-$TS.sql.gz s3://sparklabx-backups/db/dump-$TS.sql.gz
                  echo "Backup uploaded: dump-$TS.sql.gz"
                  # Retention: delete dumps older than 7 days
                  CUTOFF=$(date -d '7 days ago' +%Y%m%d)
                  aws --endpoint-url $MINIO_ENDPOINT s3 ls s3://sparklabx-backups/db/ | \
                    awk '{print $4}' | \
                    while read f; do
                      DATE=$(echo $f | grep -oE '[0-9]{8}' | head -1)
                      if [ -n "$DATE" ] && [ "$DATE" -lt "$CUTOFF" ]; then
                        echo "Deleting old: $f"
                        aws --endpoint-url $MINIO_ENDPOINT s3 rm s3://sparklabx-backups/db/$f
                      fi
                    done
              env:
                - name: POSTGRES_DB
                  valueFrom: { configMapKeyRef: { name: sparklabx-config, key: POSTGRES_DB } }
                - name: POSTGRES_USER
                  valueFrom: { configMapKeyRef: { name: sparklabx-config, key: POSTGRES_USER } }
                - name: PGPASSWORD
                  valueFrom: { secretKeyRef: { name: sparklabx-secrets, key: POSTGRES_PASSWORD } }
                - name: MINIO_ENDPOINT
                  valueFrom: { configMapKeyRef: { name: sparklabx-config, key: MINIO_ENDPOINT } }
                - name: AWS_ACCESS_KEY_ID
                  valueFrom: { secretKeyRef: { name: sparklabx-secrets, key: MINIO_ROOT_USER } }
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom: { secretKeyRef: { name: sparklabx-secrets, key: MINIO_ROOT_PASSWORD } }
                - name: AWS_DEFAULT_REGION
                  value: us-east-1
