# Requires nginx-ingress-controller installed in the cluster.
# Replace sparklabx.example.com with your real domain.
# TLS via cert-manager (assumed installed). If not, remove tls block and use HTTP only.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sparklabx
  namespace: sparklabx
  annotations:
    # Long timeouts for kernel WebSocket (default 60s breaks long-running cells)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "2048m"
    # Upload size for notebook files / datasets
    nginx.ingress.kubernetes.io/client-body-buffer-size: "10m"
    # TLS via cert-manager (delete if not using)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - sparklabx.example.com
      secretName: sparklabx-tls
  rules:
    - host: sparklabx.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 10000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
