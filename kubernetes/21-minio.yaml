apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: sparklabx
spec:
  clusterIP: None
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  selector:
    app: minio
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: sparklabx
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      # NFS mount may have restrictive ownership/permissions. chmod once before
      # the main container starts so RustFS can write.
      initContainers:
        - name: chmod-data
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /data && chmod -R 777 /data"]
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: minio
          image: rustfs/rustfs:latest
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: RUSTFS_ROOT_USER
              valueFrom: { secretKeyRef: { name: sparklabx-secrets, key: MINIO_ROOT_USER } }
            - name: RUSTFS_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: sparklabx-secrets, key: MINIO_ROOT_PASSWORD } }
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          # RustFS (S3-compatible) doesn't expose MinIO-style /minio/health/*
          # endpoints (they fall through to S3 API → 403). TCP probe is sufficient.
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 30
  # PVC provisioned via the cluster's default StorageClass — portable
  # across EKS/GKE/AKS/k3s/bare-metal without baking a specific path or
  # NFS mount into the manifest. Bump `storage:` if you expect to store
  # large datasets in the workspace bucket.
  #
  # If your cluster doesn't have dynamic provisioning (e.g. bare-metal
  # without a CSI driver), swap volumeClaimTemplates for an inline
  # hostPath/NFS volume:
  #   volumes:
  #     - name: data
  #       hostPath:
  #         path: /shared/kubernetes/sparklabx/minio
  #         type: DirectoryOrCreate
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        # storageClassName: ""    # uncomment + set to pin a class
        resources:
          requests:
            storage: 50Gi
