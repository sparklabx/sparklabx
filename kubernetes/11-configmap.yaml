apiVersion: v1
kind: ConfigMap
metadata:
  name: sparklabx-config
  namespace: sparklabx
data:
  # Public URLs / CORS (set to your real frontend URL — comma-separated for multiple)
  CORS_ORIGINS: "https://sparklabx.datalakehouse.space"

  # OAuth client IDs (public)
  GOOGLE_CLIENT_ID: ""
  MICROSOFT_CLIENT_ID: ""

  # Admin seed (password is in Secret)
  SEED_ADMIN_USERNAME: "admin"
  SEED_ADMIN_EMAIL: "admin@example.com"

  # JWT
  JWT_EXPIRE_MINUTES: "480"

  # Postgres
  POSTGRES_DB: "sparklabx"
  POSTGRES_USER: "sparklabx"

  # Service URLs (internal)
  JUPYTER_GATEWAY_URL: "http://jupyter:8888"
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_ACCESS_KEY: "rustfs"

  # Backend
  SERVICE_PORT: "10000"
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"

  # Kernel gateway mode:
  #   shared        — one shared jupyter container (default, safe for any size)
  #   k8s_per_user  — spawn a dedicated pod per user, reap idle (autoscale)
  KERNEL_MODE: "k8s_per_user"
  KERNEL_POD_NAMESPACE: "sparklabx"
  KERNEL_POD_IMAGE: "ghcr.io/sparklabx/kernel:latest"
  KERNEL_POD_IDLE_MINUTES: "30"
  KERNEL_POD_MAX_TOTAL: "50"
