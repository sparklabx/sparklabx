name: Build & publish images

# Build all three images (backend, frontend, kernel) and push to ghcr.io.
# Triggers on:
#   - push to main      → :main and :sha-<short> tags
#   - push of vX.Y.Z    → :vX.Y.Z and :latest tags
#   - manual dispatch   → :manual-<run-id>

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}   # "sparklabx" when run in the org

jobs:
  build:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            context: .
            dockerfile: backend/Dockerfile
          - image: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - image: kernel
            context: ./kernel
            dockerfile: ./kernel/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          # kernel is the heaviest (PySpark JARs); amd64-only saves ~10 min per run.
          # Override per-image if you need multi-arch.
          platforms: linux/amd64${{ matrix.image == 'kernel' && '' || ',linux/arm64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Inline cache + GitHub Actions cache for fast rebuilds across runs.
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
            VITE_MICROSOFT_CLIENT_ID=${{ vars.VITE_MICROSOFT_CLIENT_ID }}
            VITE_MICROSOFT_TENANT_ID=${{ vars.VITE_MICROSOFT_TENANT_ID }}
