name: CI

on:
  pull_request:
    branches: [dev, test, main]
  push:
    branches: [dev, test]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend:       ${{ steps.f.outputs.backend }}
      frontend:      ${{ steps.f.outputs.frontend }}
      kernel:        ${{ steps.f.outputs.kernel }}
      chart:         ${{ steps.f.outputs.chart }}
      docker_matrix: ${{ steps.m.outputs.matrix }}
      docker_any:    ${{ steps.m.outputs.any }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: f
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker-compose*.yml'
            frontend:
              - 'frontend/**'
            kernel:
              - 'kernel/**'
            chart:
              - 'chart/**'
      - name: Build docker matrix from changed paths
        id: m
        env:
          BACKEND:  ${{ steps.f.outputs.backend }}
          FRONTEND: ${{ steps.f.outputs.frontend }}
          KERNEL:   ${{ steps.f.outputs.kernel }}
        run: |
          items=()
          [ "$BACKEND"  = "true" ] && items+=('{"image":"backend","context":".","dockerfile":"backend/Dockerfile"}')
          [ "$FRONTEND" = "true" ] && items+=('{"image":"frontend","context":"frontend","dockerfile":"frontend/Dockerfile"}')
          [ "$KERNEL"   = "true" ] && items+=('{"image":"kernel","context":"kernel","dockerfile":"kernel/Dockerfile"}')
          if [ ${#items[@]} -eq 0 ]; then
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            joined=$(IFS=,; echo "${items[*]}")
            echo "matrix={\"include\":[${joined}]}" >> "$GITHUB_OUTPUT"
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi

  backend:
    name: Backend (Go)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: go mod download
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false
          working-directory: backend
      - name: govulncheck (CVE scan)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  frontend:
    name: Frontend (Vite + TS)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - name: ESLint
        run: npx eslint src/ --max-warnings=0
      - name: Build (tsc + vite)
        env:
          VITE_GOOGLE_CLIENT_ID: dummy
          VITE_MICROSOFT_CLIENT_ID: dummy
          VITE_MICROSOFT_TENANT_ID: dummy
        run: npm run build
      - name: npm audit (HIGH+)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true   # advisory only — CVE often in transitives

  helm:
    name: Helm chart
    needs: changes
    if: needs.changes.outputs.chart == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: helm lint
        run: helm lint chart/
      - name: helm template (render check)
        run: helm template sparklabx chart/ --debug > /tmp/rendered.yaml
      - name: kubeconform (K8s schema validation)
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz
          ./kubeconform -summary -schema-location default -schema-location \
            'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -strict -ignore-missing-schemas /tmp/rendered.yaml

  trivy-fs:
    name: Trivy (filesystem CVE + misconfig)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: sarif
          output: trivy-fs.sarif
      - name: Upload to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history for diff scan
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    name: Docker build verify (${{ matrix.image }})
    needs: changes
    if: needs.changes.outputs.docker_any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.docker_matrix) }}
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ci-${{ matrix.image }}:pr
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ci-${{ matrix.image }}:pr
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: sarif
          output: trivy-image-${{ matrix.image }}.sarif
      - name: Upload to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-${{ matrix.image }}.sarif
          category: trivy-image-${{ matrix.image }}

  ci-success:
    name: CI success
    needs: [backend, frontend, helm, trivy-fs, gitleaks, docker-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no required job failed
        run: |
          fail=0
          for r in '${{ needs.backend.result }}' '${{ needs.frontend.result }}' \
                   '${{ needs.helm.result }}' '${{ needs.trivy-fs.result }}' \
                   '${{ needs.gitleaks.result }}' '${{ needs.docker-build.result }}'; do
            case "$r" in
              success|skipped) ;;
              *) echo "::error::job result: $r"; fail=1 ;;
            esac
          done
          exit $fail
