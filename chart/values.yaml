# Default values for sparklabx Helm chart.
# Override with `--values my-values.yaml` or `--set key=value` on install/upgrade.

# ─────────────────────────────────────────────────────────────
# Image references — versioned at the release level. Pin to a SHA or
# semver tag (e.g. v0.3.0) in production; "latest" is fine for dev.
# ─────────────────────────────────────────────────────────────
image:
  backend:
    repository: ghcr.io/sparklabx/backend
    tag: latest
    pullPolicy: IfNotPresent
  frontend:
    repository: ghcr.io/sparklabx/frontend
    tag: latest
    pullPolicy: IfNotPresent
  kernel:
    # Image spawned per user when kernelMode=docker_per_user/k8s_per_user.
    repository: ghcr.io/sparklabx/kernel
    tag: latest

# ─────────────────────────────────────────────────────────────
# Kernel isolation mode. See README's KERNEL_MODE section.
#   - shared          : one Jupyter container for everyone (demo only)
#   - docker_per_user : one container per user via host Docker (single-host)
#   - k8s_per_user    : one pod per user (production)
# ─────────────────────────────────────────────────────────────
kernelMode: k8s_per_user

kernel:
  # How long an idle kernel survives before the reaper deletes it.
  idleMinutes: 30
  # Cluster-wide cap. Prevents one runaway notebook from exhausting nodes.
  maxTotal: 50
  # Per-user kernel pod resources. Sets the ceiling each user can use;
  # Spark driver/executor memory is configured by the user at session time
  # (within these limits). For docker_per_user mode, only the limits apply
  # (Docker has no separate "request" concept).
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

# ─────────────────────────────────────────────────────────────
# Secrets. Either let the chart create one (default), or point at
# a pre-existing Secret you manage out-of-band (e.g. via sealed-secrets,
# external-secrets-operator, or sops).
#
# When create=true, values below are written into a Secret. JWT_SECRET_KEY
# is REQUIRED — generate a strong one with `openssl rand -base64 48`.
# ─────────────────────────────────────────────────────────────
secrets:
  create: true
  # If create=false, the chart references this Secret by name and skips
  # creating one. Useful when you store production secrets elsewhere.
  existingSecret: ""

  jwtSecretKey: ""        # REQUIRED — `openssl rand -base64 48`
  seedAdmin:
    username: admin
    email: admin@example.com
    password: ""          # REQUIRED — change immediately after first login

  minio:
    rootUser: minioadmin
    rootPassword: ""      # REQUIRED — `openssl rand -base64 24`

  # OAuth is optional; leave blank to disable a provider.
  google:
    clientId: ""
    clientSecret: ""
  microsoft:
    clientId: ""
    clientSecret: ""
    tenantId: ""

# ─────────────────────────────────────────────────────────────
# Postgres
#
# Set `enabled: false` to skip provisioning the in-cluster StatefulSet
# and point the backend at a managed Postgres (RDS / Cloud SQL / etc.).
# The `external` block is read only when enabled=false.
# ─────────────────────────────────────────────────────────────
postgres:
  enabled: true
  external:
    host: ""          # REQUIRED when enabled=false — e.g., db.internal.corp
    port: 5432
  # Connection details — used for BOTH internal and external mode.
  database:
    name: sparklabx
    user: sparklabx
    password: sparklabx   # change for external; internal default OK for in-cluster
  # SSL mode for the connection. Default: "disable" for internal (trusted
  # in-cluster network), "require" for external. Override here if needed.
  sslMode: ""
  # Fields below are only used when enabled=true:
  image:
    repository: postgres
    tag: "16-alpine"
  persistence:
    enabled: true             # false → emptyDir (data lost on pod restart)
    storageClass: ""          # "" = cluster default
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    annotations: {}           # e.g., {velero.io/backup-volumes: data}
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 2000m, memory: 2Gi }

# ─────────────────────────────────────────────────────────────
# MinIO (S3-compatible storage for notebooks + datasets)
#
# Set `enabled: false` to point the backend at an existing S3-compatible
# endpoint (an external MinIO instance, AWS S3, R2, etc.). Note: per-user
# IAM provisioning uses MinIO's admin API (madmin-go) — fully functional
# only when the external endpoint is MinIO. AWS S3 / GCS / R2 work for
# basic read/write but per-user isolation falls back to root credentials.
# ─────────────────────────────────────────────────────────────
minio:
  enabled: true
  external:
    endpoint: ""      # REQUIRED when enabled=false — e.g., https://minio.corp:9000
  bucket: workspace
  # Fields below are only used when enabled=true:
  image:
    repository: minio/minio
    tag: latest
  persistence:
    enabled: true             # false → emptyDir (data lost on pod restart)
    storageClass: ""          # "" = cluster default
    accessModes:
      - ReadWriteOnce
    size: 50Gi
    annotations: {}
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: 2000m, memory: 4Gi }

# ─────────────────────────────────────────────────────────────
# Backend
# ─────────────────────────────────────────────────────────────
backend:
  replicas: 1
  resources:
    requests: { cpu: 200m, memory: 256Mi }
    limits:   { cpu: 2000m, memory: 1Gi }
  cors:
    origins: "*"          # tighten in production to your real domain
  logLevel: info

# ─────────────────────────────────────────────────────────────
# Frontend
# ─────────────────────────────────────────────────────────────
frontend:
  replicas: 1
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  service:
    # ClusterIP   → internal only, access via Ingress or port-forward (default)
    # NodePort    → expose on every node's IP at a static port (30000-32767)
    # LoadBalancer → cloud provider provisions an external LB with public IP
    type: ClusterIP
    port: 80
    # When type=NodePort, leave empty to let K8s assign a port, or pin one
    # in the 30000-32767 range (e.g., 30080).
    nodePort: ""
    # When type=LoadBalancer, pin a specific public IP (cloud-specific support).
    loadBalancerIP: ""
    annotations: {}

# ─────────────────────────────────────────────────────────────
# Ingress — set host + ingressClassName for your cluster
# ─────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx        # match your ingress controller (nginx, traefik, ...)
  host: sparklabx.example.com
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "2048m"
    nginx.ingress.kubernetes.io/client-body-buffer-size: "10m"
  tls:
    enabled: true
    secretName: sparklabx-tls
    # If using cert-manager, set the ClusterIssuer here. Leave empty
    # if you provision the TLS Secret manually.
    certManagerClusterIssuer: letsencrypt-prod
