server {
    listen 80;
    server_name localhost;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    gzip_proxied any;
    gzip_buffers 16 8k;

    # Root directory
    root /usr/share/nginx/html;
    index index.html;

    # ==============================================
    # DNS RESOLVER for Kubernetes
    # ==============================================
    # Use CoreDNS/kube-dns for dynamic DNS resolution
    # Standard Kubernetes DNS is at: 10.43.0.10 (may vary by cluster)
    # Using cluster DNS service IP (check with: kubectl get svc -n kube-system)
    resolver 10.43.0.10 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ==============================================
    # API PROXY TO GOVERNANCE SERVICE (Main Backend)
    # ==============================================
    # Governance has 2 types of endpoints:
    # 1. /auth/* (auth domain) - needs rewrite /api/auth/* -> /auth/*
    # 2. /api/* (proxy domain) - keep prefix as-is

    # AUTH endpoints - REGEX match first (higher priority)
    location ~ ^/api/auth/ {
        set $governance_backend "backend.data-platform.svc.cluster.local:8001";

        # Rewrite: /api/auth/token -> /auth/token
        rewrite ^/api/auth/(.*)$ /auth/$1 break;

        proxy_pass http://$governance_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Increased timeouts for slow API calls
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        send_timeout 120s;

        proxy_intercept_errors off;
    }

    # ==============================================
    # AI AGENT PROXY
    # ==============================================
    # Routes /api/ai/* to AI Agent service (MUST be before /api/ catch-all)
    
    location ~ ^/api/ai/ {
        set $ai_agent_backend "ai-agent-service.data-platform.svc.cluster.local:8002";

        proxy_pass http://$ai_agent_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Increased timeouts for AI chat (can be slow)
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        send_timeout 120s;

        proxy_intercept_errors off;
    }

    # ALL OTHER /api/* endpoints - PREFIX match (keep /api prefix)
    location /api/ {
        set $governance_backend "backend.data-platform.svc.cluster.local:8001";

        # NO rewrite - governance expects /api/* for:
        # /api/clusters, /api/spark/*, /api/governance/*, /api/airflow/*, /api/airbyte/*

        proxy_pass http://$governance_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Increased timeouts for slow API calls (Airflow, Spark, etc.)
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        send_timeout 120s;

        proxy_intercept_errors off;
    }

    # ==============================================
    # AIRFLOW PROXY
    # ==============================================

    location /airflow/ {
        # Proxy to Governance Service (which proxies to Airflow)
        set $governance_backend "backend.data-platform.svc.cluster.local:8001";

        # Pass through to governance service
        proxy_pass http://$governance_backend;

        # Headers
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;

        # Don't fallback to index.html
        proxy_intercept_errors off;
    }

    # ==============================================
    # WEBSOCKET ENDPOINT
    # ==============================================

    location /ws {
        # Use variable for dynamic DNS resolution
        set $governance_backend "backend.data-platform.svc.cluster.local:8001";
        proxy_pass http://$governance_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # WebSocket timeouts (1 hour)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ==============================================
    # STATIC ASSETS
    # ==============================================

    # IMPORTANT: Only apply caching to frontend assets, NOT to proxied /api/ paths
    # Negative lookahead (?!api/) ensures Spark UI static assets are proxied correctly
    location ~ ^/(?!api/).*\.(js|css|json|xml|svg)$ {
        gzip_static on;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~ ^/(?!api/).*\.(png|jpg|jpeg|gif|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ==============================================
    # HEALTH CHECK
    # ==============================================

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Kubernetes readiness/liveness probe
    location /readyz {
        access_log off;
        return 200 "ready\n";
        add_header Content-Type text/plain;
    }

    location /livez {
        access_log off;
        return 200 "alive\n";
        add_header Content-Type text/plain;
    }

    # ==============================================
    # CLICKHOUSE ANALYTICS API PROXY (/ch/* prefix)
    # ==============================================
    # ClickHouse analytics endpoints have /ch/ prefix to avoid conflicts
    # Frontend calls: /ch/api/governance/analytics/*
    # Backend expects: /ch/api/governance/analytics/*

    location ~ ^/ch/api/ {
        set $governance_backend "backend.data-platform.svc.cluster.local:8001";

        # NO rewrite - pass through with /ch prefix intact
        proxy_pass http://$governance_backend;

        # Standard proxy headers
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;

        # Increased timeouts for ClickHouse queries
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        send_timeout 120s;

        # Don't fallback to index.html on errors
        proxy_intercept_errors off;
    }

    # ==============================================
    # METADATA DOMAIN PROXY (connections, metadata-ingestion)
    # ==============================================
    # Frontend calls: /connections, /connections/*, /metadata-ingestion/*, etc.
    # Backend expects: /connections, /connections/*, /metadata-ingestion/*, etc.

    location ~ ^/(connections|metadata-ingestion)(/|$) {
        set $governance_backend "backend.data-platform.svc.cluster.local:8001";

        # NO rewrite - pass through as-is
        proxy_pass http://$governance_backend;

        # Standard proxy headers
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;

        # Increased timeouts for metadata operations
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        send_timeout 120s;

        # Don't fallback to index.html on errors
        proxy_intercept_errors off;
    }

    # ==============================================
    # CATCH-ALL GOVERNANCE API PROXY
    # ==============================================
    # Catches: /governance/*, /catalog/*, /lineage/*, /metadata/*, /access-control/*
    # This must be BEFORE location / to prevent fallback to index.html

    location ~ ^/(governance|catalog|lineage|metadata|access-control|data-access-audit)/ {
        set $governance_backend "backend.data-platform.svc.cluster.local:8001";
        proxy_pass http://$governance_backend;

        # Standard proxy headers
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;

        # Increased timeouts for governance operations
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        send_timeout 120s;

        # Don't fallback to index.html on errors
        proxy_intercept_errors off;
    }

    # ==============================================
    # SPA ROUTING
    # ==============================================

    location / {
        try_files $uri $uri/ /index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Strict CSP - only allow same-origin API calls
        # Note: 'self' covers all same-origin paths including /api/ and /ws
        # WebSocket connections (ws: and wss:) need explicit scheme in connect-src
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://accounts.google.com; img-src 'self' data: https: https://lh3.googleusercontent.com; font-src 'self' data: https://fonts.gstatic.com; worker-src 'self' blob:; connect-src 'self' ws: wss: https://accounts.google.com https://oauth2.googleapis.com https://www.googleapis.com; frame-src 'self' https://accounts.google.com;" always;
    }
}

# WebSocket upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
